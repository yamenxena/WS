<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Majaz AI OS — Dashboard</title>
  <meta name="description" content="Majaz Engineering Consultancy — AI Operating System Dashboard. Real-time CRM, project tracking, supervision, and task management." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏗️</text></svg>" />
</head>
<body>
  <!-- Mobile Hamburger -->
  <button class="hamburger" id="hamburger" aria-label="Toggle navigation">☰</button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar — 4 Large Action Buttons -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">🏗️</span>
        <div class="logo-text">
          <span class="logo-name">MAJAZ</span>
          <span class="logo-sub">AI OS</span>
        </div>
      </div>
    </div>

    <div class="sidebar-actions">
      <button class="sidebar-btn active" data-panel="filters" id="btn-filters">
        <span class="sidebar-btn-icon">⚙️</span>
        <span class="sidebar-btn-label">Filters</span>
      </button>
      <button class="sidebar-btn" data-panel="flow" id="btn-flow">
        <span class="sidebar-btn-icon">🔀</span>
        <span class="sidebar-btn-label">Flow</span>
      </button>
      <button class="sidebar-btn" data-panel="timeline" id="btn-timeline">
        <span class="sidebar-btn-icon">📅</span>
        <span class="sidebar-btn-label">Timeline</span>
      </button>
    </div>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-actions sidebar-actions-bottom">
      <button class="sidebar-btn sidebar-btn-logout" id="btn-logout">
        <span class="sidebar-btn-icon">🚪</span>
        <span class="sidebar-btn-label">Logout</span>
      </button>
    </div>

    <div class="sidebar-footer">
      <div class="footer-info">
        <span class="footer-version">v1.7.0</span>
        <span class="footer-date" id="current-date"></span>
      </div>
    </div>
  </aside>

  <!-- Main Content Wrapper -->
  <div class="main-wrapper">
    <!-- Top Navbar -->
    <header class="top-navbar" id="top-navbar">
      <nav class="navbar-tabs" id="navbar-tabs">
        <a class="navbar-tab active" data-view="dashboard" id="nav-dashboard">📊 Dashboard</a>
        <a class="navbar-tab" data-view="crm" id="nav-crm">👥 CRM</a>
        <a class="navbar-tab" data-view="projects" id="nav-projects">📐 Projects</a>
        <a class="navbar-tab" data-view="tasks" id="nav-tasks">✅ Tasks</a>
        <a class="navbar-tab" data-view="supervision" id="nav-supervision">🔍 Supervision</a>
        <a class="navbar-tab" data-view="content" id="nav-content">📱 Content</a>
        <a class="navbar-tab" href="https://docs.google.com/spreadsheets/d/1tUOi9TsCRKXcELz1JK0WohKfeiDiQL3PQp0zvYLYmTk/edit?gid=1098074229#gid=1098074229" target="_blank" id="nav-sheets">📗 Sheets ↗</a>
      </nav>
      <div class="navbar-search">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="global-search" placeholder="Search leads, projects, tasks…" autocomplete="off" />
        <kbd class="search-kbd">Esc</kbd>
      </div>
    </header>

    <!-- Search Results Overlay -->
    <div class="search-results" id="search-results"></div>

    <!-- Main Content -->
    <main class="main" id="main-content">
      <!-- Dashboard View -->
      <section class="view active" id="view-dashboard"></section>
      <!-- CRM View -->
      <section class="view" id="view-crm"></section>
      <!-- Projects View -->
      <section class="view" id="view-projects"></section>
      <!-- Tasks View -->
      <section class="view" id="view-tasks"></section>
      <!-- Supervision View -->
      <section class="view" id="view-supervision"></section>
      <!-- Content View -->
      <section class="view" id="view-content"></section>
    </main>
  </div>

  <!-- Side Panels (Filters / Flow / Timeline) -->
  <div class="side-panel" id="panel-filters">
    <div class="side-panel-header">
      <h3>⚙️ Filters</h3>
      <button class="side-panel-close" data-close-panel>&times;</button>
    </div>
    <div class="side-panel-body" id="filters-body"></div>
  </div>

  <div class="side-panel" id="panel-flow">
    <div class="side-panel-header">
      <h3>🔀 Flow</h3>
      <button class="side-panel-close" data-close-panel>&times;</button>
    </div>
    <div class="side-panel-body" id="flow-body"></div>
  </div>

  <div class="side-panel" id="panel-timeline">
    <div class="side-panel-header">
      <h3>📅 Timeline</h3>
      <button class="side-panel-close" data-close-panel>&times;</button>
    </div>
    <div class="side-panel-body" id="timeline-body"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
