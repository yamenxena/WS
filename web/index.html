<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Majaz AI OS — Dashboard</title>
  <meta name="description" content="Majaz Engineering Consultancy — AI Operating System Dashboard. Real-time CRM, project tracking, supervision, and task management." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏗️</text></svg>" />
</head>
<body>
  <!-- Mobile Hamburger -->
  <button class="hamburger" id="hamburger" aria-label="Toggle navigation">☰</button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand-lockup">
        <div class="sidebar-brand-mark">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4146 2953" fill="currentColor" fill-rule="evenodd" class="majaz-logo-svg">
            <path d="M 3515 2322 L 3516 2321 L 3517 2321 L 3518 2322 L 3519 2321 L 4143 2321 L 4145 2323 L 4145 2950 L 4143 2952 L 4136 2952 L 4135 2951 L 3518 2951 L 3517 2952 L 3515 2950 Z" />
            <path d="M 2232 1 L 2233 0 L 4136 0 L 4137 1 L 4137 1266 L 4135 1268 L 3508 1268 L 3507 1267 L 3507 633 L 3506 632 L 3506 631 L 3505 630 L 2232 630 L 2231 629 L 2232 628 Z" />
            <path d="M 0 1 L 1 0 L 629 0 L 630 1 L 630 629 L 629 630 L 2 630 L 0 628 L 1 627 L 0 626 L 0 8 L 1 7 L 1 5 L 0 4 Z" />
          </svg>
        </div>
        <div class="sidebar-brand-text">
          <span class="sidebar-brand-arabic" dir="rtl" lang="ar">مجاز للاستشارات الهندسية</span>
          <span class="sidebar-brand-english">AI OS</span>
        </div>
      </div>
    </div>

    <nav class="nav">
      <div class="nav-section">
        <span class="nav-label">OVERVIEW</span>
        <a class="nav-item active" data-view="dashboard" id="nav-dashboard">
          <span class="nav-icon">📊</span> Dashboard
        </a>
      </div>

      <div class="nav-section">
        <span class="nav-label">OPERATIONS</span>
        <a class="nav-item" data-view="crm" id="nav-crm">
          <span class="nav-icon">👥</span> CRM Pipeline
          <span class="nav-badge badge-warning">3</span>
        </a>
        <a class="nav-item" data-view="projects" id="nav-projects">
          <span class="nav-icon">📐</span> Projects
          <span class="nav-badge badge-danger">180K</span>
        </a>
        <a class="nav-item" data-view="tasks" id="nav-tasks">
          <span class="nav-icon">✅</span> Tasks
          <span class="nav-badge badge-danger">3</span>
        </a>
        <a class="nav-item" data-view="supervision" id="nav-supervision">
          <span class="nav-icon">🔍</span> Supervision
        </a>
        <a class="nav-item" data-view="content" id="nav-content">
          <span class="nav-icon">📱</span> Content
          <span class="nav-badge badge-warning">0/3</span>
        </a>
      </div>

      <div class="nav-section">
        <span class="nav-label">EXTERNAL</span>
        <a class="nav-item" href="https://docs.google.com/spreadsheets/d/1tUOi9TsCRKXcELz1JK0WohKfeiDiQL3PQp0zvYLYmTk/edit?gid=1098074229#gid=1098074229" target="_blank" id="nav-sheets">
          <span class="nav-icon">📗</span> Google Sheets
          <span class="nav-external">↗</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="footer-info">
        <span class="footer-version">v1.6.0</span>
        <span class="footer-date" id="current-date"></span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main" id="main-content">
    <!-- Dashboard View -->
    <section class="view active" id="view-dashboard"></section>

    <!-- CRM View -->
    <section class="view" id="view-crm"></section>

    <!-- Projects View -->
    <section class="view" id="view-projects"></section>

    <!-- Tasks View -->
    <section class="view" id="view-tasks"></section>

    <!-- Supervision View -->
    <section class="view" id="view-supervision"></section>

    <!-- Content View -->
    <section class="view" id="view-content"></section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
