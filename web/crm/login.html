<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Majaz CRM — Login</title>
  <meta name="description" content="Login to Majaz Engineering Consultancy CRM" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏗️</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', sans-serif;
      color: #f0f0f0;
      background: #0D0D1A;
    }

    .login-page {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .login-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.35) saturate(0.8);
    }

    .login-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(13, 13, 26, 0.95) 0%,
        rgba(15, 52, 96, 0.6) 50%,
        rgba(212, 168, 83, 0.1) 100%
      );
    }

    .login-card {
      position: relative;
      z-index: 10;
      width: 400px;
      max-width: 90vw;
      background: rgba(26, 26, 46, 0.75);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: cardIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-brand-lockup {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      justify-content: center;
      color: #FAFAFA;
    }

    .brand-line-left, .brand-line-right {
      width: 2px;
      height: 48px;
      background-color: #D4A853;
      border-radius: 2px;
    }

    .brand-logo-mark {
      width: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FAFAFA;
    }
    .brand-logo-mark svg {
      width: 100%;
      height: auto;
    }

    .brand-typography {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }

    .brand-arabic {
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: 0em;
      line-height: 1;
      margin: 0;
      text-align: right;
    }

    .brand-english {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: #8A8A9A;
      line-height: 1;
      margin: 0;
      text-transform: uppercase;
    }

    .login-welcome {
      font-size: 0.85rem;
      color: #8A8A9A;
      margin: 16px 0 28px;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8A8A9A;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(13, 13, 26, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .field input:focus {
      border-color: rgba(212, 168, 83, 0.4);
      box-shadow: 0 0 0 3px rgba(212, 168, 83, 0.1);
    }

    .field input::placeholder {
      color: #5A5A6A;
    }

    .login-btn {
      width: 100%;
      padding: 13px;
      margin-top: 8px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      background: linear-gradient(135deg, #D4A853, #B8892E);
      color: #0D0D1A;
      transition: all 0.25s ease;
      letter-spacing: 0.03em;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(212, 168, 83, 0.3);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .login-error {
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(229, 57, 53, 0.12);
      border: 1px solid rgba(229, 57, 53, 0.25);
      border-radius: 8px;
      color: #E53935;
      font-size: 0.8rem;
      display: none;
    }

    .login-error.visible { display: block; animation: shake 0.3s ease; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.7rem;
      color: #5A5A6A;
    }

    .login-skip {
      display: block;
      margin-top: 12px;
      text-align: center;
      font-size: 0.75rem;
      color: #5A5A6A;
      cursor: pointer;
      transition: color 0.2s;
    }
    .login-skip:hover { color: #D4A853; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-bg">
      <img src="../img/Generated_Image_February_23_2026_-_10_48AM.jpeg" alt="Modern villa" />
    </div>

    <div class="login-card">
      <div class="login-brand-lockup">
        <div class="brand-line-left"></div>
        <div class="brand-logo-mark">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 103.7 92.73" class="majaz-logo" fill="currentColor">
            <g class="majaz-brand-main">
              <path d="M27.26,0c0,.25,0,.5,0,.75V54.16c0,.21.06.26.3.27H103.4q.22,0,.24.27v9.93c0,.14,0,.27,0,.41s-.1.16-.18.17H16.62a.17.17,0,0,1-.18-.16c0-.18,0-.36,0-.55V.41c0-.14,0-.27,0-.41Z"/>
              <path d="M0,92.73a1.18,1.18,0,0,0,0-.2c0-.18,0-.36,0-.54V47.16c0-.23,0-.46,0-.69a.22.22,0,0,1,.22-.21H10.69s.13.09.14.13,0,.13,0,.2V91.71c0,.34,0,.68,0,1Z"/>
              <path d="M54.59,29.87H70.67c.13,0,.2.08.2.23s0,.41,0,.61v20.2a4.89,4.89,0,0,1,0,.54s0,.08-.09.1a.31.31,0,0,1-.13,0H60.84c-.2,0-.41,0-.61,0,0,0-.07,0-.09-.09a.25.25,0,0,1,0-.13c0-.2,0-.41,0-.61V41.41c0-.21,0-.41,0-.62A.26.26,0,0,0,60,40.7a.32.32,0,0,0-.14,0H38.49c-.15,0-.23-.09-.24-.26V30.54a5.07,5.07,0,0,1,0-.55s0-.07.08-.09a.32.32,0,0,1,.14,0H54.59Z"/>
              <path d="M10.84,35.27v4.65c0,.19,0,.37,0,.55a.2.2,0,0,1-.17.19H.26a.19.19,0,0,1-.19-.17c0-.11,0-.22,0-.34V30.36c0-.11,0-.23,0-.34a.2.2,0,0,1,.13-.14H10.4a1.2,1.2,0,0,1,.27,0c.06,0,.14.07.14.12a2.58,2.58,0,0,1,0,.48Z"/>
              <path d="M65.61,80.41H60.54c-.24,0-.29-.05-.3-.26V69.94c0-.28.06-.33.31-.33H70.82a.18.18,0,0,1,.18.17c0,.13,0,.27,0,.4v9.66c0,.13,0,.27,0,.41a.26.26,0,0,1-.13.14H65.61Z"/>
            </g>
            <g class="majaz-brand-blue" fill="#2877b9">
              <path d="M92.73,51.64h10.2c.2,0,.41,0,.61,0a.23.23,0,0,0,.13-.14,2.73,2.73,0,0,0,0-.41V41.28a2.62,2.62,0,0,0,0-.28c0-.18,0-.3-.27-.3H82.68l-.62,0a.2.2,0,0,0-.17.18c0,.19,0,.37,0,.55v9.45c0,.15,0,.31,0,.47s.08.26.24.27H92.73Z"/>
            </g>
          </svg>
        </div>
        <div class="brand-typography">
          <div class="brand-arabic" dir="rtl" lang="ar">مجاز للاستشارات الهندسية</div>
          <div class="brand-english">MAJAZ ENGINEERING CONSULTANCY</div>
        </div>
        <div class="brand-line-right"></div>
      </div>
      <p class="login-welcome">Sign in to manage projects, clients, and tasks.</p>

      <form id="login-form" autocomplete="on">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter username" required autofocus />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" required />
        </div>
        <button type="submit" class="login-btn" id="login-btn">Sign In</button>
        <div class="login-error" id="login-error">Invalid username or password</div>
      </form>

      <div class="login-dev-credentials" style="margin-top: 24px; text-align: center; border: 1px dashed rgba(255,255,255,0.1); padding: 12px; border-radius: 8px;">
        <div style="font-size: 0.7rem; color: #8A8A9A; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;">Development Credentials</div>
        <div style="font-size: 0.85rem; color: #f0f0f0; margin-bottom: 4px;"><strong>Admin:</strong> admin / majaz2026</div>
        <div style="font-size: 0.85rem; color: #f0f0f0;"><strong>Employee:</strong> team / majaz2026</div>
      </div>

      <a class="login-skip" id="login-skip" style="display:none; margin-top:12px;">Skip → Open CRM (dev mode)</a>

      <div class="login-footer">
        &copy; 2026 Majaz Engineering Consultancy
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.hostname === 'localhost'
      ? 'http://localhost:5051'
      : window.location.origin;

    // Check if already authenticated
    const token = sessionStorage.getItem('majaz_token');
    if (token) {
      window.location.href = 'index.html';
    }

    // Login form
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errEl.classList.remove('visible');

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });

        if (!res.ok) throw new Error('auth_failed');
        const data = await res.json();
        sessionStorage.setItem('majaz_token', data.token);
        sessionStorage.setItem('majaz_role', data.role || 'team');
        window.location.href = 'index.html';
      } catch (err) {
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });

    // Dev skip (localhost only)
    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
      const skipEl = document.getElementById('login-skip');
      if (skipEl) {
        skipEl.style.display = '';
        skipEl.addEventListener('click', () => {
          sessionStorage.setItem('majaz_token', 'dev-bypass');
          sessionStorage.setItem('majaz_role', 'admin');
          window.location.href = 'index.html';
        });
      }
    }
  </script>
</body>
</html>
